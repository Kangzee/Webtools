<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Hash Generator Online - MD5, SHA-256</title>
    <meta name="description" content="Generate MD5, SHA-1, and SHA-256 cryptographic hashes instantly.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#3b82f6', dark: '#0f172a' } } } }</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex flex-col min-h-screen">
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center">
            <a href="index.html" class="text-xl font-bold text-primary flex items-center gap-2">← Back</a>
        </div>
    </nav>
    <main class="max-w-4xl mx-auto px-4 py-8 flex-grow w-full">
        <h1 class="text-2xl font-extrabold text-dark mb-2">Hash Generator</h1>
        <p class="text-gray-500 mb-6">Create MD5, SHA-1, and SHA-256 hashes from text.</p>

        <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm">
            <textarea id="hash-input" oninput="generateHashes()" class="w-full h-32 p-4 rounded-xl border border-gray-300 outline-none focus:border-primary font-mono text-sm mb-4 shadow-inner" placeholder="Type your text here..."></textarea>
            
            <div class="flex flex-col gap-4">
                <div>
                    <label class="font-bold text-sm text-gray-700">MD5</label>
                    <input type="text" id="md5-out" class="w-full p-3 bg-gray-100 rounded-lg font-mono text-sm outline-none text-gray-600" readonly>
                </div>
                <div>
                    <label class="font-bold text-sm text-gray-700">SHA-1</label>
                    <input type="text" id="sha1-out" class="w-full p-3 bg-gray-100 rounded-lg font-mono text-sm outline-none text-gray-600" readonly>
                </div>
                <div>
                    <label class="font-bold text-sm text-gray-700">SHA-256</label>
                    <input type="text" id="sha256-out" class="w-full p-3 bg-gray-100 rounded-lg font-mono text-sm outline-none text-primary font-bold" readonly>
                </div>
            </div>
        </div>
    </main>
    <footer class="bg-white border-t border-gray-200 py-6 text-center text-gray-500 text-sm mt-auto"><p>© 2026 ToolBox.</p></footer>
    
    <script>
        function generateHashes() {
            let text = document.getElementById('hash-input').value;
            if(!text) {
                document.getElementById('md5-out').value = '';
                document.getElementById('sha1-out').value = '';
                document.getElementById('sha256-out').value = '';
                return;
            }
            document.getElementById('md5-out').value = CryptoJS.MD5(text).toString();
            document.getElementById('sha1-out').value = CryptoJS.SHA1(text).toString();
            document.getElementById('sha256-out').value = CryptoJS.SHA256(text).toString();
        }
    </script>
</body>
</html>
