<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Lorem Ipsum Generator Online</title>
    <meta name="description" content="Generate Lorem Ipsum placeholder text instantly for your design and web projects. Free and fast.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#3b82f6', dark: '#0f172a' } } } }</script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased flex flex-col min-h-screen">
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold text-primary flex items-center gap-2">← Back</a>
            <div class="text-sm font-bold text-dark">Lorem Ipsum</div>
        </div>
    </nav>
    <main class="max-w-4xl mx-auto px-4 py-8 flex-grow w-full">
        <h1 class="text-2xl md:text-3xl font-extrabold text-dark mb-2">Lorem Ipsum Generator</h1>
        <p class="text-gray-500 mb-6">Generate dummy text for your layout needs.</p>

        <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm mb-6">
            <div class="flex items-center gap-4 mb-4">
                <label class="font-bold">Paragraphs:</label>
                <input type="number" id="para-count" value="3" min="1" max="50" class="w-24 p-2 border border-gray-300 rounded outline-none focus:border-primary">
                <button onclick="generateText()" class="bg-primary hover:bg-blue-600 text-white font-bold py-2 px-6 rounded transition">Generate</button>
            </div>
            <textarea id="output" class="w-full h-64 p-4 rounded border border-gray-300 outline-none text-gray-600 resize-none mb-2" readonly></textarea>
            <button onclick="copyText()" class="bg-dark text-white px-4 py-2 rounded font-bold hover:bg-gray-800">Copy Text</button>
        </div>
    </main>
    <footer class="bg-white border-t border-gray-200 py-6 text-center text-gray-500 text-sm mt-auto"><p>© 2026 ToolBox.</p></footer>
    <script>
        const texts = [
            "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.",
            "Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.",
            "Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.",
            "Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum."
        ];
        function generateText() {
            let count = document.getElementById('para-count').value;
            let result = "";
            for(let i=0; i<count; i++) {
                result += texts[i % texts.length] + " ";
                if((i+1) % 4 === 0) result += "\n\n";
            }
            document.getElementById('output').value = result.trim();
        }
        function copyText() {
            navigator.clipboard.writeText(document.getElementById('output').value);
            alert("Copied!");
        }
        window.onload = generateText;
    </script>
</body>
</html>
