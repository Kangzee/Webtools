<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Unit Converter Online - Length Converter</title>
    <meta name="description" content="Convert between meters, kilometers, centimeters, miles, and feet instantly.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#3b82f6', dark: '#0f172a' } } } }</script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased flex flex-col min-h-screen">
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold text-primary flex items-center gap-2">← Back</a>
            <div class="text-sm font-bold text-dark">Length Converter</div>
        </div>
    </nav>
    <main class="max-w-xl mx-auto px-4 py-8 flex-grow w-full">
        <h1 class="text-2xl font-extrabold text-dark mb-2">Length Converter</h1>
        <p class="text-gray-500 mb-6">Fast and easy length unit conversion.</p>

        <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm">
            <div class="flex flex-col gap-4">
                <div>
                    <label class="font-bold text-sm text-gray-700">Value to convert</label>
                    <input type="number" id="inputVal" oninput="convert()" placeholder="0" class="w-full p-3 border border-gray-300 rounded outline-none focus:border-primary mt-1 text-lg">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="font-bold text-sm text-gray-700">From</label>
                        <select id="fromUnit" onchange="convert()" class="w-full p-3 border border-gray-300 rounded mt-1 bg-white outline-none">
                            <option value="m">Meters (m)</option>
                            <option value="km">Kilometers (km)</option>
                            <option value="cm">Centimeters (cm)</option>
                            <option value="mi">Miles (mi)</option>
                            <option value="ft">Feet (ft)</option>
                        </select>
                    </div>
                    <div>
                        <label class="font-bold text-sm text-gray-700">To</label>
                        <select id="toUnit" onchange="convert()" class="w-full p-3 border border-gray-300 rounded mt-1 bg-white outline-none">
                            <option value="ft">Feet (ft)</option>
                            <option value="m">Meters (m)</option>
                            <option value="km">Kilometers (km)</option>
                            <option value="cm">Centimeters (cm)</option>
                            <option value="mi">Miles (mi)</option>
                        </select>
                    </div>
                </div>
                <div class="mt-4 p-4 bg-gray-100 rounded text-center">
                    <span class="text-gray-500 font-bold block mb-1">Result:</span>
                    <span id="result" class="text-3xl font-black text-dark">0</span>
                </div>
            </div>
        </div>
    </main>
    <footer class="bg-white border-t border-gray-200 py-6 text-center text-gray-500 text-sm mt-auto"><p>© 2026 ToolBox.</p></footer>
    
    <script>
        const rates = { 'm': 1, 'km': 0.001, 'cm': 100, 'mi': 0.000621371, 'ft': 3.28084 };
        function convert() {
            let val = parseFloat(document.getElementById('inputVal').value);
            let from = document.getElementById('fromUnit').value;
            let to = document.getElementById('toUnit').value;
            
            if(isNaN(val)) { document.getElementById('result').innerText = "0"; return; }
            
            let inMeters = val / rates[from];
            let result = inMeters * rates[to];
            
            document.getElementById('result').innerText = parseFloat(result.toFixed(5)).toString();
        }
    </script>
</body>
</html>
