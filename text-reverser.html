<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse Text Generator - Backwards Text Maker</title>
    <meta name="description" content="Reverse your text instantly. Type your words and watch them flip backwards automatically.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#3b82f6', dark: '#0f172a' } } } }</script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased flex flex-col min-h-screen">
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold text-primary flex items-center gap-2">← Back</a>
            <div class="text-sm font-bold text-dark">Text Reverser</div>
        </div>
    </nav>
    <main class="max-w-4xl mx-auto px-4 py-8 flex-grow w-full">
        <h1 class="text-2xl font-extrabold text-dark mb-2">Reverse Text Generator</h1>
        <p class="text-gray-500 mb-6">Type below to reverse your text instantly.</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <textarea id="input" oninput="reverseText()" class="w-full h-64 p-4 rounded-xl border border-gray-300 outline-none focus:border-primary" placeholder="Type here..."></textarea>
            <div class="relative">
                <textarea id="output" class="w-full h-64 p-4 rounded-xl border border-gray-300 bg-gray-100 outline-none" readonly placeholder="...ereh epyT"></textarea>
                <button onclick="copyText()" class="absolute right-4 bottom-4 bg-dark text-white px-4 py-2 rounded font-bold hover:bg-gray-800">Copy</button>
            </div>
        </div>
    </main>
    <footer class="bg-white border-t border-gray-200 py-6 text-center text-gray-500 text-sm mt-auto"><p>© 2026 ToolBox.</p></footer>
    <script>
        function reverseText() {
            let str = document.getElementById('input').value;
            document.getElementById('output').value = str.split('').reverse().join('');
        }
        function copyText() {
            navigator.clipboard.writeText(document.getElementById('output').value);
            alert("Copied!");
        }
    </script>
</body>
</html>
