<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker & HEX to RGB Converter</title>
    <meta name="description" content="Pick colors and instantly get HEX, RGB, and HSL values. Free color converter tool.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#3b82f6', dark: '#0f172a' } } } }</script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex flex-col min-h-screen">
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold text-primary flex items-center gap-2">← Back</a>
            <div class="text-sm font-bold text-dark">Color Picker</div>
        </div>
    </nav>
    <main class="max-w-xl mx-auto px-4 py-8 flex-grow w-full">
        <h1 class="text-2xl font-extrabold text-dark mb-2">Color Picker & Converter</h1>
        <p class="text-gray-500 mb-6">Select a color to get its HTML/CSS codes.</p>

        <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm flex flex-col items-center gap-6">
            <div class="relative w-32 h-32 rounded-full overflow-hidden border-4 border-gray-200 shadow-lg cursor-pointer">
                <input type="color" id="color-input" value="#3b82f6" oninput="updateColors()" class="absolute -top-4 -left-4 w-40 h-40 cursor-pointer">
            </div>
            <p class="text-sm text-gray-500 font-bold">Tap the circle to pick a color</p>
            
            <div class="w-full flex flex-col gap-3 mt-4">
                <div class="flex justify-between items-center bg-gray-100 p-3 rounded-lg border border-gray-200">
                    <span class="font-bold text-gray-600">HEX</span>
                    <span id="hex-val" class="font-mono font-bold text-dark text-lg">#3b82f6</span>
                </div>
                <div class="flex justify-between items-center bg-gray-100 p-3 rounded-lg border border-gray-200">
                    <span class="font-bold text-gray-600">RGB</span>
                    <span id="rgb-val" class="font-mono font-bold text-dark text-lg">rgb(59, 130, 246)</span>
                </div>
            </div>
        </div>
    </main>
    <footer class="bg-white border-t border-gray-200 py-6 text-center text-gray-500 text-sm mt-auto"><p>© 2026 ToolBox.</p></footer>
    
    <script>
        function updateColors() {
            let hex = document.getElementById('color-input').value;
            document.getElementById('hex-val').innerText = hex;
            
            // Konversi HEX ke RGB
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            
            document.getElementById('rgb-val').innerText = `rgb(${r}, ${g}, ${b})`;
        }
    </script>
</body>
</html>
