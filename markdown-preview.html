<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown to HTML Previewer</title>
    <meta name="description" content="Write Markdown and preview HTML instantly. Free online Markdown editor.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#3b82f6', dark: '#0f172a' } } } }</script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex flex-col min-h-screen">
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center">
            <a href="index.html" class="text-xl font-bold text-primary flex items-center gap-2">← Back</a>
        </div>
    </nav>
    <main class="max-w-6xl mx-auto px-4 py-8 flex-grow w-full">
        <h1 class="text-2xl font-extrabold text-dark mb-2">Markdown Previewer</h1>
        <p class="text-gray-500 mb-6">Type markdown on the left, see HTML on the right.</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <textarea id="md-input" oninput="updatePreview()" class="w-full h-96 p-4 rounded-xl border border-gray-300 outline-none focus:border-primary font-mono text-sm shadow-inner" placeholder="# Hello World&#10;&#10;Start typing **markdown** here..."></textarea>
            
            <div id="md-output" class="w-full h-96 p-6 rounded-xl border border-gray-300 bg-white overflow-y-auto prose max-w-none">
                <h1>Hello World</h1><p>Start typing <strong>markdown</strong> here...</p>
            </div>
        </div>
    </main>
    <footer class="bg-white border-t border-gray-200 py-6 text-center text-gray-500 text-sm mt-auto"><p>© 2026 ToolBox.</p></footer>
    
    <script>
        function updatePreview() {
            let markdownText = document.getElementById('md-input').value;
            // Gunakan marked.parse() untuk convert
            document.getElementById('md-output').innerHTML = marked.parse(markdownText);
        }
    </script>
</body>
</html>
