<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Loan Calculator - Simulasi Cicilan</title>
    <meta name="description" content="Calculate your monthly loan payments, interest, and total cost easily.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#3b82f6', dark: '#0f172a' } } } }</script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex flex-col min-h-screen">
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center">
            <a href="index.html" class="text-xl font-bold text-primary flex items-center gap-2">← Back</a>
        </div>
    </nav>
    <main class="max-w-xl mx-auto px-4 py-8 flex-grow w-full">
        <h1 class="text-2xl font-extrabold text-dark mb-2">Loan Calculator</h1>
        <p class="text-gray-500 mb-6">Estimate your monthly payment and interest.</p>

        <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm flex flex-col gap-4">
            <div>
                <label class="font-bold text-sm text-gray-700">Loan Amount (Principal)</label>
                <input type="number" id="amount" class="w-full p-3 border border-gray-300 rounded-xl outline-none focus:border-primary mt-1" placeholder="10000">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="font-bold text-sm text-gray-700">Interest Rate (%)</label>
                    <input type="number" id="rate" class="w-full p-3 border border-gray-300 rounded-xl outline-none focus:border-primary mt-1" placeholder="5">
                </div>
                <div>
                    <label class="font-bold text-sm text-gray-700">Term (Months)</label>
                    <input type="number" id="months" class="w-full p-3 border border-gray-300 rounded-xl outline-none focus:border-primary mt-1" placeholder="12">
                </div>
            </div>
            
            <button onclick="calculateLoan()" class="w-full bg-primary text-white font-bold py-3 rounded-xl hover:bg-blue-600 transition mt-2">Calculate</button>
            
            <div id="result-box" class="hidden mt-4 p-5 bg-gray-100 border border-gray-200 rounded-xl text-center">
                <span class="text-gray-500 font-bold block mb-1">Monthly Payment</span>
                <span id="monthly-payment" class="text-4xl font-black text-dark block mb-4">0</span>
                
                <div class="flex justify-between text-sm text-gray-600 border-t border-gray-300 pt-3">
                    <span>Total Interest: <b id="total-interest" class="text-dark">0</b></span>
                    <span>Total Cost: <b id="total-payment" class="text-dark">0</b></span>
                </div>
            </div>
        </div>
    </main>
    <footer class="bg-white border-t border-gray-200 py-6 text-center text-gray-500 text-sm mt-auto"><p>© 2026 ToolBox.</p></footer>
    
    <script>
        function calculateLoan() {
            let principal = parseFloat(document.getElementById('amount').value);
            let calculatedInterest = parseFloat(document.getElementById('rate').value) / 100 / 12;
            let calculatedPayments = parseFloat(document.getElementById('months').value);

            if(isNaN(principal) || isNaN(calculatedInterest) || isNaN(calculatedPayments)) return alert("Please fill all fields");

            let x = Math.pow(1 + calculatedInterest, calculatedPayments);
            let monthly = (principal * x * calculatedInterest) / (x - 1);

            if(isFinite(monthly)) {
                document.getElementById('monthly-payment').innerText = monthly.toFixed(2);
                document.getElementById('total-payment').innerText = (monthly * calculatedPayments).toFixed(2);
                document.getElementById('total-interest').innerText = ((monthly * calculatedPayments) - principal).toFixed(2);
                document.getElementById('result-box').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
