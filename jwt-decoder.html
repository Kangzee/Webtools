<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free JWT Decoder Online - Parse JSON Web Tokens</title>
    <meta name="description" content="Decode and parse JSON Web Tokens (JWT) securely in your browser. No data is sent to the server.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#3b82f6', dark: '#0f172a' } } } }</script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex flex-col min-h-screen">
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center">
            <a href="index.html" class="text-xl font-bold text-primary flex items-center gap-2">← Back</a>
        </div>
    </nav>
    <main class="max-w-5xl mx-auto px-4 py-8 flex-grow w-full">
        <h1 class="text-2xl font-extrabold text-dark mb-2">JWT Decoder</h1>
        <p class="text-gray-500 mb-6">Decode your JSON Web Tokens instantly. 100% client-side execution.</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="flex flex-col gap-2">
                <label class="font-bold text-sm text-gray-700">Encoded JWT</label>
                <textarea id="jwt-input" oninput="decodeJWT()" class="w-full h-96 p-4 rounded-xl border border-gray-300 outline-none focus:border-primary font-mono text-sm shadow-inner break-all" placeholder="Paste your JWT here (eyJhbG...)"></textarea>
            </div>
            
            <div class="flex flex-col gap-4">
                <div class="flex flex-col gap-2">
                    <label class="font-bold text-sm text-gray-700">Header (Algorithm & Token Type)</label>
                    <textarea id="jwt-header" class="w-full h-32 p-4 rounded-xl border border-gray-300 bg-gray-100 font-mono text-sm text-pink-600 outline-none resize-none" readonly></textarea>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="font-bold text-sm text-gray-700">Payload (Data Claims)</label>
                    <textarea id="jwt-payload" class="w-full h-56 p-4 rounded-xl border border-gray-300 bg-gray-100 font-mono text-sm text-blue-600 outline-none resize-none" readonly></textarea>
                </div>
            </div>
        </div>
    </main>
    <footer class="bg-white border-t border-gray-200 py-6 text-center text-gray-500 text-sm mt-auto"><p>© 2026 ToolBox.</p></footer>
    
    <script>
        function decodeJWT() {
            const token = document.getElementById('jwt-input').value.trim();
            const headerOut = document.getElementById('jwt-header');
            const payloadOut = document.getElementById('jwt-payload');
            
            if(!token) {
                headerOut.value = '';
                payloadOut.value = '';
                return;
            }

            try {
                const parts = token.split('.');
                if(parts.length !== 3) throw new Error('Invalid JWT');

                // Decode Header
                let headerStr = parts[0].replace(/-/g, '+').replace(/_/g, '/');
                let decodedHeader = decodeURIComponent(atob(headerStr).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                headerOut.value = JSON.stringify(JSON.parse(decodedHeader), null, 4);

                // Decode Payload
                let payloadStr = parts[1].replace(/-/g, '+').replace(/_/g, '/');
                let decodedPayload = decodeURIComponent(atob(payloadStr).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                payloadOut.value = JSON.stringify(JSON.parse(decodedPayload), null, 4);

            } catch(e) {
                headerOut.value = 'Invalid or corrupted Token...';
                payloadOut.value = 'Invalid or corrupted Token...';
            }
        }
    </script>
</body>
</html>
